name: Distribute Beta

# Required repository secrets:
# - APPSTORE_CERTIFICATES_FILE_BASE64
# - APPSTORE_CERTIFICATES_PASSWORD
# - APPSTORE_ISSUER_ID
# - APPSTORE_API_KEY_ID
# - APPSTORE_API_PRIVATE_KEY

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Override CFBundleVersion. Defaults to UTC yyyymmdd.hhmmss."
        required: false
        type: string
      release_notes:
        description: "Optional TestFlight release notes."
        required: false
        type: string
      internal_only:
        description: "Limit this build to internal TestFlight testing only."
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: distribute-beta
  cancel-in-progress: false

jobs:
  distribute:
    runs-on: macos-26
    environment: beta
    timeout-minutes: 30
    env:
      PROJECT_PATH: onraku.xcodeproj
      SCHEME: onraku
      CONFIGURATION: Release
      APP_BUNDLE_ID: info.polamjag.onraku
      TEAM_ID: LWW9E66T79

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve build number
        id: build-number
        env:
          INPUT_BUILD_NUMBER: ${{ github.event.inputs.build_number }}
        run: |
          if [ -n "$INPUT_BUILD_NUMBER" ]; then
            BUILD_NUMBER="$INPUT_BUILD_NUMBER"
          else
            BUILD_NUMBER="$(date -u +%Y%m%d.%H%M%S)"
          fi

          if ! [[ "$BUILD_NUMBER" =~ ^[0-9]+(\.[0-9]+){0,2}$ ]]; then
            echo "build_number must contain digits with up to two dot-separated components" >&2
            exit 1
          fi

          echo "value=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Import distribution certificate
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          p12-password: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}

      - name: Download App Store provisioning profile
        id: provisioning-profile
        uses: apple-actions/download-provisioning-profiles@c62019de00bb4395ed414e4a17c98f4e279636de # v6
        with:
          bundle-id: ${{ env.APP_BUNDLE_ID }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Prepare App Store Connect API key
        run: |
          AUTH_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPSTORE_API_KEY_ID}.p8"
          printf '%s' "$APPSTORE_API_PRIVATE_KEY" | perl -pe 's/\\n/\n/g' > "$AUTH_KEY_PATH"
          chmod 600 "$AUTH_KEY_PATH"
          echo "path=$AUTH_KEY_PATH" >> "$GITHUB_OUTPUT"
        id: appstore-api-key
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Archive app
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/$SCHEME.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APPSTORE_API_KEY_PATH" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID" \
            CURRENT_PROJECT_VERSION="${{ steps.build-number.outputs.value }}" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            clean archive
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_KEY_PATH: ${{ steps.appstore-api-key.outputs.path }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          TEAM_ID: ${{ env.TEAM_ID }}

      - name: Create export options
        run: |
          {
            cat <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
          PLIST

            if [ "$INTERNAL_ONLY" = "true" ]; then
              cat <<PLIST
            <key>testFlightInternalTestingOnly</key>
            <true/>
          PLIST
            fi

            cat <<PLIST
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          } > "$RUNNER_TEMP/ExportOptions.plist"
        env:
          TEAM_ID: ${{ env.TEAM_ID }}
          INTERNAL_ONLY: ${{ github.event.inputs.internal_only }}

      - name: Export ipa
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/$SCHEME.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APPSTORE_API_KEY_PATH" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID" \
            -exportPath "$RUNNER_TEMP/export"
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_KEY_PATH: ${{ steps.appstore-api-key.outputs.path }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}

      - name: Resolve ipa path
        id: exported-ipa
        run: |
          IPA_PATH="$(find "$RUNNER_TEMP/export" -maxdepth 1 -name '*.ipa' -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "No ipa was exported" >&2
            exit 1
          fi

          echo "path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: onraku-beta-${{ steps.build-number.outputs.value }}
          path: |
            ${{ steps.exported-ipa.outputs.path }}
            ${{ runner.temp }}/onraku.xcarchive
          if-no-files-found: error

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@1ad58030672057aa084b4e96beb6f7a8c627f9e6 # v5
        with:
          app-path: ${{ steps.exported-ipa.outputs.path }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          release-notes: ${{ github.event.inputs.release_notes }}
